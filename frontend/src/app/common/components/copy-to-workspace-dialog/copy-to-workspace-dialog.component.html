 <!-- 
  Commonly reused dialog for copying items between workspaces.
  Uses SharedModule components for UI.
 -->

<div class="copy-dialog-container glass-morphism">
  <div class="dialog-header">
    <h2 class="dialog-title">Copy to Workspace</h2>
    <p class="dialog-subtitle">
      Select the target workspace for the {{ data.itemCount }} selected items.
    </p>
  </div>

  <div class="dialog-content">
    <div class="search-container">
      <studio-search-filter
        [(value)]="searchQuery"
        placeholder="Search workspaces..."
        size="small"
      ></studio-search-filter>
    </div>

    <div class="workspace-list custom-scrollbar">
      <div
        *ngFor="let workspace of filteredWorkspaces"
        class="workspace-item"
        [class.selected]="selectedWorkspaceId === workspace.id"
        (click)="selectWorkspace(workspace)"
      >
        <div class="workspace-info">
          <span class="workspace-name">{{ workspace.name }}</span>
          <span class="workspace-scope">{{ workspace.scope }}</span>
        </div>
        <mat-icon *ngIf="selectedWorkspaceId === workspace.id"
          >check_circle</mat-icon
        >
      </div>

      <div *ngIf="filteredWorkspaces.length === 0" class="no-results">
        No workspaces found matching "{{ searchQuery }}"
      </div>
    </div>
  </div>

  <div class="dialog-footer">
    <studio-button variant="primary" size="medium" (click)="dialogRef.close()">
      Cancel
    </studio-button>
    <studio-button
      variant="primary"
      size="medium"
      (click)="confirm()"
      [disabled]="!selectedWorkspaceId || isCopying"
    >
      <mat-progress-spinner
        *ngIf="isCopying"
        mode="indeterminate"
        [diameter]="18"
        class="inline-spinner"
      ></mat-progress-spinner>
      {{ isCopying ? 'Copying...' : 'Copy Items' }}
    </studio-button>
  </div>
</div>
